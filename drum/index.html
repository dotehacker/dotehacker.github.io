<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Drum Machine — Sumit Yadav</title>
<meta name="description" content="A tiny browser drum machine. Press A S D F G H J K L or tap the keys.">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="stylesheet" href="/drum/style.css">
<style>
  body{
    background:#111 url('/drum/background.jpg') center/cover no-repeat fixed;
  }
  .topbar{position:fixed;top:0;left:0;right:0;padding:14px 18px;color:#fff;
    font:14px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    text-shadow:0 0 .4rem #000;z-index:2}
  .topbar a{color:#ffc600;text-decoration:none}
  .topbar a:hover{text-decoration:underline}
  .hint{position:fixed;bottom:14px;left:0;right:0;text-align:center;color:#fff;
    text-shadow:0 0 .4rem #000;font:13px sans-serif;z-index:2}
  .key{cursor:pointer;user-select:none}
</style>
</head>
<body>

<div class="topbar"><a href="/">← Sumit Yadav</a></div>

<div class="keys">
  <div data-key="65" class="key"><kbd>A</kbd><span class="sound">clap</span></div>
  <div data-key="83" class="key"><kbd>S</kbd><span class="sound">hihat</span></div>
  <div data-key="68" class="key"><kbd>D</kbd><span class="sound">kick</span></div>
  <div data-key="70" class="key"><kbd>F</kbd><span class="sound">openhat</span></div>
  <div data-key="71" class="key"><kbd>G</kbd><span class="sound">boom</span></div>
  <div data-key="72" class="key"><kbd>H</kbd><span class="sound">ride</span></div>
  <div data-key="74" class="key"><kbd>J</kbd><span class="sound">snare</span></div>
  <div data-key="75" class="key"><kbd>K</kbd><span class="sound">tom</span></div>
  <div data-key="76" class="key"><kbd>L</kbd><span class="sound">tink</span></div>
</div>

<audio data-key="65" src="/drum/sounds/clap.wav"></audio>
<audio data-key="83" src="/drum/sounds/hihat.wav"></audio>
<audio data-key="68" src="/drum/sounds/kick.wav"></audio>
<audio data-key="70" src="/drum/sounds/openhat.wav"></audio>
<audio data-key="71" src="/drum/sounds/boom.wav"></audio>
<audio data-key="72" src="/drum/sounds/ride.wav"></audio>
<audio data-key="74" src="/drum/sounds/snare.wav"></audio>
<audio data-key="75" src="/drum/sounds/tom.wav"></audio>
<audio data-key="76" src="/drum/sounds/tink.wav"></audio>

<div class="hint">Press <b>A S D F G H J K L</b> on your keyboard — or tap the keys.</div>

<script>
  function removeTransition(e) {
    if (e.propertyName !== 'transform') return;
    e.target.classList.remove('playing');
  }

  function playByKeyCode(keyCode) {
    const audio = document.querySelector(`audio[data-key="${keyCode}"]`);
    const key = document.querySelector(`div[data-key="${keyCode}"]`);
    if (!audio) return;
    key.classList.add('playing');
    audio.currentTime = 0;
    audio.play();
  }

  const keys = Array.from(document.querySelectorAll('.key'));
  keys.forEach(key => {
    key.addEventListener('transitionend', removeTransition);
    const code = key.getAttribute('data-key');
    const trigger = (e) => { e.preventDefault(); playByKeyCode(code); };
    key.addEventListener('click', trigger);
    key.addEventListener('touchstart', trigger, { passive: false });
  });
  window.addEventListener('keydown', (e) => playByKeyCode(e.keyCode));
</script>

</body>
</html>
