<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Removing each single decoder layer</title>
<style>
  :root{
    --bg:#ffffff; --surface:#faf9fb; --ink:#1f2328; --muted:#6a6f76; --faint:#8b9097;
    --rule:#e8e6ec; --grid:#eeecf1; --accent:#5b4b9e; --accent-soft:#efeaf8;
    --s1:#2a78d6; --band-a:#eef1ef; --band-b:#fbeede; --band-c:#e9eef7;
    --chip:#f4f3f7; --tip-bg:rgba(255,255,255,.97); --tip-bd:#d9d7e0;
  }
  @media (prefers-color-scheme:dark){ :root:where(:not([data-theme="light"])){
    --bg:#14151a; --surface:#1b1d24; --ink:#e6e7ea; --muted:#a3a8b2; --faint:#7e848f;
    --rule:#2a2d36; --grid:#232630; --accent:#a48fff; --accent-soft:#232036;
    --s1:#3987e5; --band-a:#1a1f1c; --band-b:#241d18; --band-c:#171d29;
    --chip:#20232c; --tip-bg:rgba(27,29,36,.97); --tip-bd:#3a3d47;
  }}
  :root[data-theme="dark"]{
    --bg:#14151a; --surface:#1b1d24; --ink:#e6e7ea; --muted:#a3a8b2; --faint:#7e848f;
    --rule:#2a2d36; --grid:#232630; --accent:#a48fff; --accent-soft:#232036;
    --s1:#3987e5; --band-a:#1a1f1c; --band-b:#241d18; --band-c:#171d29;
    --chip:#20232c; --tip-bg:rgba(27,29,36,.97); --tip-bd:#3a3d47;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .wrap{padding:14px 12px 8px}
  .head h3{margin:0 0 2px;font-size:15px;font-weight:700;letter-spacing:-.01em}
  .head p{margin:0 0 8px;font-size:12.5px;color:var(--muted);line-height:1.45}
  .controls{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin:4px 0 8px}
  .ctl{display:flex;align-items:center;gap:6px}
  .ctl .lab{font-size:11px;color:var(--faint);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
  .btn{border:1px solid var(--rule);background:var(--chip);color:var(--muted);
    font:inherit;font-size:11.5px;padding:3px 10px;border-radius:999px;cursor:pointer;transition:.12s}
  .btn:hover{color:var(--ink)}
  .btn[aria-pressed="true"]{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);font-weight:600}
  .btn[disabled]{opacity:.4;cursor:not-allowed}
  .plot{position:relative}
  svg{width:100%;height:auto;display:block;overflow:visible}
  .grid line{stroke:var(--grid);stroke-width:1}
  .axis line{stroke:var(--rule);stroke-width:1}
  .tick text{fill:var(--muted);font-size:11px}
  .axlabel{fill:var(--faint);font-size:11px}
  .base{stroke:var(--faint);stroke-width:1;stroke-dasharray:2 3}
  .base-t{fill:var(--faint);font-size:10.5px}
  .rgl{font-size:10.5px;fill:var(--faint);font-weight:600;letter-spacing:.02em}
  .cross{stroke:var(--faint);stroke-width:1;stroke-dasharray:3 3;opacity:0}
  .tip{position:absolute;pointer-events:none;opacity:0;transform:translate(-50%,-108%);
    background:var(--tip-bg);border:1px solid var(--tip-bd);border-radius:8px;padding:7px 9px;
    font-size:11.5px;line-height:1.5;white-space:nowrap;box-shadow:0 6px 20px rgba(0,0,0,.14);z-index:5}
  .cap{margin:6px 2px 0;font-size:11px;color:var(--faint);line-height:1.4}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h3>Remove one decoder layer at a time — an early cliff, not a U</h3>
    <p>Teacher-forced on each prompt's own greedy continuation. Only <b>L0–L1</b> are load-bearing; every layer from L2 on is remarkably survivable. Toggle the metric and the sample size.</p>
  </div>
  <div class="controls">
    <div class="ctl"><span class="lab">Metric</span>
      <button class="btn" data-m="top1" aria-pressed="true">top-1 agreement</button>
      <button class="btn" data-m="kl">KL divergence</button>
      <button class="btn" data-m="entropy">entropy</button>
      <button class="btn" data-m="ppl">perplexity</button>
    </div>
    <div class="ctl"><span class="lab">Prompts</span>
      <button class="btn" data-d="8" aria-pressed="true">8</button>
      <button class="btn" data-d="100">100 (±1σ)</button>
    </div>
  </div>
  <div class="plot">
    <svg id="svg" viewBox="0 0 820 400" role="img" aria-label="Single-layer ablation sweep"></svg>
    <div class="tip" id="tip"></div>
  </div>
  <p class="cap" id="cap"></p>
</div>
<script>
const L=Array.from({length:32},(_,i)=>i);
const D={
 top1_8:[0.0619,0.2328,0.9369,0.9258,0.9262,0.9623,0.9536,0.9307,0.9539,0.9476,0.9530,0.9237,0.9617,0.9198,0.9511,0.9139,0.9345,0.9315,0.9262,0.9513,0.9476,0.9344,0.9148,0.9444,0.9509,0.9506,0.9588,0.9569,0.9244,0.9595,0.8918,0.8825],
 kl_8:[17.9767,14.2409,0.2195,0.1792,0.1412,0.0949,0.1011,0.1134,0.0658,0.1096,0.0676,0.1386,0.1137,0.1412,0.0930,0.1295,0.1464,0.1245,0.1407,0.0833,0.0920,0.1027,0.0762,0.1127,0.0649,0.1318,0.0490,0.0488,0.1120,0.0844,0.2160,0.9780],
 ent_8:[5.2251,4.1036,0.2901,0.2592,0.2065,0.2290,0.2109,0.1628,0.2342,0.2538,0.2278,0.3203,0.2766,0.3439,0.2730,0.3235,0.2402,0.2625,0.2494,0.2532,0.2597,0.2459,0.2435,0.2437,0.2375,0.2657,0.2551,0.2260,0.2937,0.2657,0.3087,0.6463],
 ppl_8:[10668.96,1062.22,1.2100,1.2269,1.2363,1.1624,1.1718,1.2744,1.1768,1.2341,1.1721,1.2233,1.2123,1.2431,1.1713,1.2539,1.2342,1.2356,1.2352,1.1886,1.1958,1.1875,1.2054,1.2128,1.1971,1.2144,1.1727,1.1416,1.2238,1.1672,1.3558,1.7167],
 top1_100:[0.0715,0.2426,0.9157,0.9290,0.9052,0.9090,0.9131,0.9103,0.9215,0.9131,0.9257,0.9108,0.9133,0.9048,0.9141,0.8936,0.8877,0.9185,0.9040,0.9188,0.9163,0.9195,0.9287,0.9347,0.9349,0.9377,0.9400,0.9285,0.9366,0.9091,0.8784,0.8096],
 top1_100s:[0.0778,0.1445,0.0729,0.0649,0.0797,0.0725,0.0639,0.0666,0.0698,0.0743,0.0680,0.0730,0.0765,0.0719,0.0775,0.0794,0.0829,0.0749,0.0798,0.0727,0.0670,0.0795,0.0703,0.0600,0.0594,0.0598,0.0548,0.0622,0.0617,0.0697,0.0781,0.1126],
 kl_100:[17.2027,12.5756,0.1535,0.1192,0.1400,0.1374,0.1268,0.1367,0.0947,0.1396,0.0807,0.1761,0.1298,0.2088,0.1272,0.2865,0.2071,0.1120,0.2389,0.1002,0.1135,0.1048,0.0666,0.0727,0.0715,0.0620,0.0572,0.0882,0.0944,0.1199,0.2024,1.1789],
 kl_100s:[2.7712,2.5715,0.1050,0.2059,0.1075,0.1170,0.1100,0.1046,0.0731,0.1027,0.0585,0.1465,0.1053,0.1484,0.1320,0.4913,0.2788,0.1264,0.4839,0.1733,0.1342,0.1265,0.0673,0.0841,0.0759,0.0811,0.0647,0.1081,0.1119,0.1100,0.1514,0.7574]
};
const META={
 top1:{label:'top-1 agreement with intact model',dom:[0,1],fmt:v=>(v*100).toFixed(0)+'%',tf:v=>(v*100).toFixed(1)+'%',ticks:[0,.25,.5,.75,1],base:1,scale:'lin',both:true},
 kl:{label:'mean KL(ablated ‖ baseline)',dom:[0,19],fmt:v=>v.toFixed(0),tf:v=>v.toFixed(3),ticks:[0,4,8,12,16],base:0,scale:'lin',both:true},
 entropy:{label:'entropy H(p_abl), nats',dom:[0,5.6],fmt:v=>v.toFixed(1),tf:v=>v.toFixed(3),ticks:[0,1,2,3,4,5],base:0.214,scale:'lin',both:false},
 ppl:{label:'perplexity (log scale)',dom:[1,20000],fmt:v=>v>=1000?(v/1000)+'k':v,tf:v=>v.toFixed(2),ticks:[1,10,100,1000,10000],base:1.104,scale:'log',both:false}
};
let cur={m:'top1',d:'8'};
const svg=document.getElementById('svg'),tip=document.getElementById('tip'),cap=document.getElementById('cap');
const W=820,H=400,pad={l:56,r:16,t:16,b:44},xd=[0,31];
const NS="http://www.w3.org/2000/svg";
const el=(n,a)=>{const e=document.createElementNS(NS,n);for(const k in a)e.setAttribute(k,a[k]);return e;};
const sx=v=>pad.l+(v-xd[0])/(xd[1]-xd[0])*(W-pad.l-pad.r);
let yd,scale;
const sy=v=>{const [a,b]=yd;if(scale==='log'){const la=Math.log10(a),lb=Math.log10(b);return (H-pad.b)-(Math.log10(Math.max(v,a))-la)/(lb-la)*(H-pad.t-pad.b);}return (H-pad.b)-(v-a)/(b-a)*(H-pad.t-pad.b);};

function draw(){
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  const M=META[cur.m]; yd=M.dom; scale=M.scale;
  const suffix=(cur.d==='100'&&M.both)?'100':'8';
  const Y=D[cur.m+'_'+suffix];
  const band=(cur.d==='100'&&M.both)?D[cur.m+'_100s']:null;
  // regime bands (decoder index): early 0-4, concept 5-16, output 17-31
  [[0,4.5,'var(--band-a)','EARLY 0–4'],[4.5,16.5,'var(--band-b)','CONCEPT 5–16'],[16.5,31,'var(--band-c)','OUTPUT 17–31']].forEach(([a,b,f,lab])=>{
    svg.appendChild(el('rect',{x:sx(a),y:pad.t,width:sx(b)-sx(a),height:(H-pad.b)-pad.t,fill:f}));
    const t=el('text',{x:(sx(a)+sx(b))/2,y:pad.t+13,'text-anchor':'middle','class':'rgl'});t.textContent=lab;svg.appendChild(t);
  });
  // grid + y ticks
  const g=el('g',{'class':'grid'});svg.appendChild(g);
  M.ticks.forEach(v=>{g.appendChild(el('line',{x1:pad.l,y1:sy(v),x2:W-pad.r,y2:sy(v)}));
    const t=el('text',{x:pad.l-8,y:sy(v)+3.5,'text-anchor':'end','class':'tick'});t.textContent=M.fmt(v);g.appendChild(t);});
  // baseline
  if(M.base!=null&&M.base>=yd[0]&&M.base<=yd[1]){
    svg.appendChild(el('line',{x1:pad.l,y1:sy(M.base),x2:W-pad.r,y2:sy(M.base),'class':'base'}));
    const bt=el('text',{x:W-pad.r,y:sy(M.base)+(cur.m==='top1'?-4:12),'text-anchor':'end','class':'base-t'});
    bt.textContent='intact baseline';svg.appendChild(bt);
  }
  // x axis
  const ax=el('g',{'class':'axis'});svg.appendChild(ax);
  ax.appendChild(el('line',{x1:pad.l,y1:H-pad.b,x2:W-pad.r,y2:H-pad.b}));
  [0,4,8,12,16,20,24,28,31].forEach(v=>{const t=el('text',{x:sx(v),y:H-pad.b+16,'text-anchor':'middle','class':'tick'});t.textContent='L'+v;ax.appendChild(t);});
  const xl=el('text',{x:(pad.l+W-pad.r)/2,y:H-6,'text-anchor':'middle','class':'axlabel'});xl.textContent='decoder layer removed  (0 … 31)';svg.appendChild(xl);
  const yl=el('text',{x:15,y:(pad.t+H-pad.b)/2,'text-anchor':'middle','class':'axlabel',transform:`rotate(-90 15 ${(pad.t+H-pad.b)/2})`});yl.textContent=M.label;svg.appendChild(yl);
  // variance band
  if(band){
    const up=L.map((x,i)=>[x,Math.min(yd[1],Y[i]+band[i])]);
    const lo=L.map((x,i)=>[x,Math.max(yd[0],Y[i]-band[i])]);
    const d=up.map((p,i)=>(i?'L':'M')+sx(p[0]).toFixed(1)+' '+sy(p[1]).toFixed(1)).join(' ')+' '+
      lo.reverse().map(p=>'L'+sx(p[0]).toFixed(1)+' '+sy(p[1]).toFixed(1)).join(' ')+' Z';
    svg.appendChild(el('path',{d,fill:'var(--s1)','fill-opacity':.14}));
  }
  // line + dots
  const line=L.map((x,i)=>[x,Math.max(yd[0],Math.min(yd[1],Y[i]))]);
  svg.appendChild(el('path',{d:line.map((p,i)=>(i?'L':'M')+sx(p[0]).toFixed(1)+' '+sy(p[1]).toFixed(1)).join(' '),
    fill:'none',stroke:'var(--s1)','stroke-width':2.4,'stroke-linejoin':'round'}));
  L.forEach((x,i)=>svg.appendChild(el('circle',{cx:sx(x),cy:sy(line[i][1]),r:2.6,fill:'var(--s1)',stroke:'var(--bg)','stroke-width':1.3})));
  // hover
  const cross=el('line',{'class':'cross',y1:pad.t,y2:H-pad.b});svg.appendChild(cross);
  const hd=el('circle',{r:4.6,fill:'var(--s1)',stroke:'var(--bg)','stroke-width':1.8,opacity:0});svg.appendChild(hd);
  const rect=el('rect',{x:pad.l,y:pad.t,width:W-pad.l-pad.r,height:(H-pad.b)-pad.t,fill:'transparent'});svg.appendChild(rect);
  const toX=evt=>{const p=svg.createSVGPoint();p.x=evt.clientX;p.y=evt.clientY;return p.matrixTransform(svg.getScreenCTM().inverse()).x;};
  function move(evt){
    let k=Math.round((toX(evt)-pad.l)/((W-pad.l-pad.r)/(xd[1]-xd[0])));k=Math.max(0,Math.min(31,k));
    cross.style.opacity=1;cross.setAttribute('x1',sx(k));cross.setAttribute('x2',sx(k));
    hd.style.opacity=1;hd.setAttribute('cx',sx(k));hd.setAttribute('cy',sy(line[k][1]));
    tip.style.opacity=1;
    tip.innerHTML=`<b>Remove decoder L${k}</b><br>${M.label.split(',')[0].replace(' (log scale)','')}: <b>${M.tf(Y[k])}</b>`+
      (band?` <span style="color:var(--muted)">± ${M.tf(band[k])}</span>`:'');
    const bb=svg.getBoundingClientRect();
    tip.style.left=(sx(k)/W*bb.width)+'px';tip.style.top=(sy(line[k][1])/H*bb.height)+'px';
  }
  rect.addEventListener('mousemove',move);
  rect.addEventListener('mouseleave',()=>{cross.style.opacity=0;hd.style.opacity=0;tip.style.opacity=0;});
  svg.addEventListener('touchmove',e=>{if(e.touches[0]){move(e.touches[0]);e.preventDefault();}},{passive:false});
  // caption
  const src=(cur.d==='100'&&M.both)?'metrics_100.json · 100 queries, ±1σ band':'metrics.json · 8 prompts';
  cap.innerHTML=`Source: <code>${src}</code>. ${cur.m==='top1'?'top-1 = fraction of positions whose argmax token is unchanged.':cur.m==='kl'?'KL is per-position, averaged over the continuation.':cur.m==='ppl'?'Perplexity of the intact model’s own continuation under the ablated model.':'Entropy of the ablated next-token distribution.'}`;
}
document.querySelectorAll('[data-m]').forEach(b=>b.addEventListener('click',()=>{
  cur.m=b.dataset.m;document.querySelectorAll('[data-m]').forEach(x=>x.setAttribute('aria-pressed',x===b));
  const only8=!META[cur.m].both;const d100=document.querySelector('[data-d="100"]');
  d100.disabled=only8;if(only8){cur.d='8';document.querySelector('[data-d="8"]').setAttribute('aria-pressed','true');d100.setAttribute('aria-pressed','false');}
  draw();
}));
document.querySelectorAll('[data-d]').forEach(b=>b.addEventListener('click',()=>{
  if(b.disabled)return;cur.d=b.dataset.d;document.querySelectorAll('[data-d]').forEach(x=>x.setAttribute('aria-pressed',x===b));draw();
}));
window.addEventListener('message',e=>{if(e.data&&e.data.type==='theme'&&e.data.theme)document.documentElement.dataset.theme=e.data.theme;});
draw();
</script>
</body>
</html>
