<details class="cite">
  <summary>Cite this post</summary>
  <div class="cite-body" id="citation-section">
    <div class="citation-tabs" role="tablist">
        <button class="citation-tab active" data-target="bibtex" role="tab" aria-selected="true">BibTeX</button>
        <button class="citation-tab" data-target="apa" role="tab" aria-selected="false">APA</button>
        <button class="citation-tab" data-target="mla" role="tab" aria-selected="false">MLA</button>
        <button class="citation-tab" data-target="chicago" role="tab" aria-selected="false">Chicago</button>
    </div>
    <div class="citation-panels">
        <div class="citation-panel active" id="panel-bibtex" role="tabpanel">
            <div class="citation-box"><pre class="citation-text" id="cite-bibtex"></pre><button class="copy-btn" data-cite="cite-bibtex">Copy</button></div>
        </div>
        <div class="citation-panel" id="panel-apa" role="tabpanel">
            <div class="citation-box"><pre class="citation-text" id="cite-apa"></pre><button class="copy-btn" data-cite="cite-apa">Copy</button></div>
        </div>
        <div class="citation-panel" id="panel-mla" role="tabpanel">
            <div class="citation-box"><pre class="citation-text" id="cite-mla"></pre><button class="copy-btn" data-cite="cite-mla">Copy</button></div>
        </div>
        <div class="citation-panel" id="panel-chicago" role="tabpanel">
            <div class="citation-box"><pre class="citation-text" id="cite-chicago"></pre><button class="copy-btn" data-cite="cite-chicago">Copy</button></div>
        </div>
    </div>
    <p class="citation-note">Auto-generated. Verify for your institution's requirements.</p>
  </div>
</details>

<template id="cite-meta">{{ page.title }}</template>

<script>
(function() {
    var meta = document.getElementById('cite-meta');
    if (!meta) return;
    var t = meta.content ? meta.content.textContent : meta.innerHTML;
    var a = '{{ site.author.name }}';
    var j = '{{ site.title }}';
    var u = '{{ site.url }}{{ page.url }}';
    var y = '{{ page.date | date: "%Y" }}';
    var mo = '{{ page.date | date: "%B" }}';
    var ms = '{{ page.date | date: "%b" }}';
    var dy = '{{ page.date | date: "%d" }}';
    var k = a.split(' ')[0].toLowerCase() + y + t.toLowerCase().replace(/[^a-z0-9]+/g, '');

    document.getElementById('cite-bibtex').textContent =
        '@article{' + k + ',\n  title     = {' + t + '},\n  author    = {' + a +
        '},\n  journal   = {' + j + '},\n  year      = {' + y + '},\n  month     = {' + mo +
        '},\n  day       = {' + dy + '},\n  url       = {' + u + '}\n}';
    document.getElementById('cite-apa').textContent =
        a + '. (' + y + ', ' + mo + ' ' + dy + '). ' + t + '. ' + j + '. ' + u;
    document.getElementById('cite-mla').textContent =
        a + '. “' + t + '.” ' + j + ', ' + dy + ' ' + ms + ' ' + y + ', ' + u + '.';
    document.getElementById('cite-chicago').textContent =
        a + '. “' + t + '.” ' + j + '. ' + mo + ' ' + dy + ', ' + y + '. ' + u + '.';

    var sec = document.getElementById('citation-section');
    sec.querySelectorAll('.citation-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
            sec.querySelectorAll('.citation-tab').forEach(function(x) { x.classList.remove('active'); x.setAttribute('aria-selected', 'false'); });
            sec.querySelectorAll('.citation-panel').forEach(function(p) { p.classList.remove('active'); });
            this.classList.add('active'); this.setAttribute('aria-selected', 'true');
            sec.querySelector('#panel-' + this.dataset.target).classList.add('active');
        });
    });
    sec.querySelectorAll('.copy-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var text = document.getElementById(this.dataset.cite).textContent;
            var b = this;
            var done = function() { b.textContent = 'Copied!'; b.classList.add('copied'); setTimeout(function() { b.textContent = 'Copy'; b.classList.remove('copied'); }, 2000); };
            navigator.clipboard.writeText(text).then(done).catch(function() {
                var ta = document.createElement('textarea'); ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
                document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); done();
            });
        });
    });
})();
</script>
