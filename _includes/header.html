<header class="site-header">
    <div class="wrap">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav class="site-nav">
            <a href="{{ '/' | relative_url }}#publications">Publications</a>
            <a href="{{ '/blog/' | relative_url }}">Blog</a>
            <button class="theme-toggle" id="theme-toggle" aria-label="Switch theme: light, dark, rain" title="Theme — click to cycle: light → dark → rain">
                <span class="theme-icon ti-light">☀️</span>
                <span class="theme-icon ti-dark">🌙</span>
                <span class="theme-icon ti-rain">🌧️</span>
            </button>
        </nav>
    </div>
</header>
