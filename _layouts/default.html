<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} · {{ site.title }}</title>
    <meta name="description" content="{{ page.description }}">
    <meta name="google-site-verification" content="IVG1y4MVA_6MT0wsjk13ooZDQLWXxvYcPXQlmf83MLM" />
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

    <!-- Mermaid.js for diagram rendering -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({ startOnLoad: true, theme: 'default' });
    </script>
</head>
<body>
    <div class="scroll-progress"><div class="scroll-progress-bar" id="scroll-progress-bar"></div></div>

    {% include header.html %}

    <main class="page-content">
        <div class="wrap">
            <div class="content-area">
                {{ content }}
            </div>
        </div>
    </main>

    {% include footer.html %}

    <script>
        (function() {
            const getThemePreference = () => {
                const stored = localStorage.getItem('theme-preference');
                if (stored) return stored;
                return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            };
            const applyTheme = (theme) => {
                const root = document.documentElement;
                root.classList.remove('light-theme', 'dark-theme');
                if (theme !== 'auto') root.classList.add(`${theme}-theme`);
                if (window.mermaid) {
                    const dark = theme === 'dark' || (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
                    mermaid.initialize({ startOnLoad: false, theme: dark ? 'dark' : 'default' });
                    document.querySelectorAll('.mermaid').forEach(el => {
                        if (el.getAttribute('data-processed')) {
                            el.removeAttribute('data-processed');
                            el.innerHTML = el.getAttribute('data-original') || el.innerHTML;
                        }
                    });
                    if (window.mermaid.init) mermaid.init(undefined, '.mermaid');
                }
            };
            document.addEventListener('DOMContentLoaded', () => {
                applyTheme(getThemePreference());
                const t = document.getElementById('theme-toggle');
                if (t) t.addEventListener('click', () => {
                    const cur = getThemePreference();
                    const next = cur === 'dark' ? 'light' : 'dark';
                    localStorage.setItem('theme-preference', next);
                    applyTheme(next);
                });
                document.querySelectorAll('.mermaid').forEach(el => {
                    if (!el.getAttribute('data-original')) el.setAttribute('data-original', el.innerHTML);
                });
            });
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                if (!localStorage.getItem('theme-preference')) applyTheme(e.matches ? 'dark' : 'light');
            });
        })();
        (function() {
            const bar = document.getElementById('scroll-progress-bar');
            if (!bar) return;
            const upd = () => {
                const st = window.pageYOffset || document.documentElement.scrollTop;
                const h = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                bar.style.height = Math.min(Math.max((st / h) * 100, 0), 100) + '%';
            };
            window.addEventListener('scroll', upd, { passive: true });
            window.addEventListener('resize', upd, { passive: true });
            upd();
        })();
    </script>
</body>
</html>
