<style>
  :root{--bg:#fff;--fg:#1a1a1a;--muted:#666;--accent:#0b5fa5;--rule:#e6e6e6}
  @media (prefers-color-scheme:dark){:root{--bg:#15171a;--fg:#e8e8e8;--muted:#9aa0a6;--accent:#6cb2ff;--rule:#2a2d31}}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:1100px;margin:0 auto;padding:40px 20px 70px}
  a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
  h1{font-size:1.6rem;margin:0 0 .2rem}
  .sub{color:var(--muted);margin:0 0 1.6rem}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
  .grid a{display:block;overflow:hidden;border-radius:8px;border:1px solid var(--rule);aspect-ratio:1/1}
  .grid img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
  .grid a:hover img{transform:scale(1.05)}
  footer{margin-top:2.5rem;color:var(--muted);font-size:.85rem}
</style>
</head>
